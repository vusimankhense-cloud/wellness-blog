<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Banner 7</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #ff6b35 0%, #2d6a4f 40%, #4a2c6e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Sunrise effect at bottom */
  .sunrise {
    position: absolute;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 180px;
    background: radial-gradient(ellipse at 50% 100%, rgba(255,107,53,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .bg-circles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .bg-circles span { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .c1 { width: 400px; height: 400px; top: -140px; right: -80px; }
  .c2 { width: 280px; height: 280px; bottom: -120px; left: 200px; }

  /* Habit steps on right */
  .habits {
    position: absolute;
    right: 56px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .habit-step {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 9px 16px;
  }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #74c69d, #40916c);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: white;
    flex-shrink: 0;
  }
  .step-text { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; }

  .top-label { position: absolute; top: 44px; left: 64px; }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(255,255,255,0.9);
  }

  .content {
    text-align: left;
    padding: 0 64px;
    padding-right: 360px;
    position: relative;
    z-index: 2;
    width: 100%;
  }
  .emoji {
    font-size: 80px; line-height: 1; margin-bottom: 20px; display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
  }
  h1 {
    font-size: 54px; font-weight: 800; color: #ffffff;
    line-height: 1.2; letter-spacing: -1.5px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.35);
  }
  h1 span { color: #74c69d; }

  .branding {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 64px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .brand-name { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #ffffff; }
  .brand-name .leaf { font-size: 22px; }
  .brand-url { font-size: 15px; color: rgba(255,255,255,0.55); }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #74c69d; }
  .brand-right { display: flex; align-items: center; gap: 12px; }
  .deco-line {
    position: absolute; left: 0; right: 0; height: 4px; top: 0;
    background: linear-gradient(90deg, #ff6b35, #74c69d, #b5a0d8);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>
  <div class="bg-circles">
    <span class="c1"></span><span class="c2"></span>
  </div>
  <div class="sunrise"></div>
  <div class="habits">
    <div class="habit-step"><div class="step-num">1</div><span class="step-text">💧 Drink water on waking</span></div>
    <div class="habit-step"><div class="step-num">2</div><span class="step-text">☀️ Get morning sunlight</span></div>
    <div class="habit-step"><div class="step-num">3</div><span class="step-text">☕ Delay caffeine 90 min</span></div>
    <div class="habit-step"><div class="step-num">4</div><span class="step-text">🥚 High-protein breakfast</span></div>
    <div class="habit-step"><div class="step-num">5</div><span class="step-text">🏃 Move for 10 minutes</span></div>
    <div class="habit-step"><div class="step-num">6</div><span class="step-text">🗒️ Set food intentions</span></div>
    <div class="habit-step"><div class="step-num">7</div><span class="step-text">⚖️ Weigh consistently</span></div>
  </div>
  <div class="top-label"><span class="tag">🌅 Morning Routine</span></div>
  <div class="content">
    <span class="emoji">🌅</span>
    <h1>Morning Routine for <span>Weight Loss:</span> 7 Habits That Work</h1>
  </div>
  <div class="branding">
    <div class="brand-name"><span class="leaf">🌿</span> The Wellness Key</div>
    <div class="brand-right">
      <div class="brand-dot"></div>
      <span class="brand-url">thewellnesskey.com</span>
    </div>
  </div>
</body>
</html>
