<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Banner 8</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0d3b52 0%, #2d6a4f 45%, #4a2c6e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Water ripple circles */
  .ripples { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(116,198,157,0.15);
  }
  .r1 { width: 200px; height: 200px; bottom: 60px; right: 120px; }
  .r2 { width: 340px; height: 340px; bottom: -20px; right: 50px; }
  .r3 { width: 480px; height: 480px; bottom: -100px; right: -20px; }
  .r4 { width: 620px; height: 620px; bottom: -180px; right: -100px; }

  .bg-circles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .bg-circles span { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .c1 { width: 400px; height: 400px; top: -140px; left: -100px; }

  /* Stats panel */
  .stats-col {
    position: absolute;
    right: 64px;
    top: 50%;
    transform: translateY(-55%);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .stat-box {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(116,198,157,0.3);
    border-radius: 16px;
    padding: 16px 24px;
    text-align: center;
    min-width: 160px;
  }
  .stat-box .snum {
    font-size: 40px; font-weight: 900;
    color: #74c69d;
    line-height: 1; display: block;
  }
  .stat-box .slbl {
    font-size: 12px; color: rgba(255,255,255,0.65);
    margin-top: 4px; line-height: 1.4;
  }

  .top-label { position: absolute; top: 44px; left: 64px; }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(255,255,255,0.9);
  }

  .content {
    text-align: left;
    padding: 0 64px;
    padding-right: 300px;
    position: relative;
    z-index: 2;
    width: 100%;
  }
  .emoji {
    font-size: 90px; line-height: 1; margin-bottom: 24px; display: block;
    filter: drop-shadow(0 4px 20px rgba(13,59,82,0.5));
  }
  h1 {
    font-size: 58px; font-weight: 800; color: #ffffff;
    line-height: 1.15; letter-spacing: -1.5px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.35);
  }
  h1 span { color: #74c69d; }

  .branding {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 64px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.22);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .brand-name { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #ffffff; }
  .brand-name .leaf { font-size: 22px; }
  .brand-url { font-size: 15px; color: rgba(255,255,255,0.55); }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #74c69d; }
  .brand-right { display: flex; align-items: center; gap: 12px; }
  .deco-line {
    position: absolute; left: 0; right: 0; height: 4px; top: 0;
    background: linear-gradient(90deg, #74c69d, #b5a0d8, #74c69d);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>
  <div class="bg-circles"><span class="c1"></span></div>
  <div class="ripples">
    <div class="ripple r1"></div>
    <div class="ripple r2"></div>
    <div class="ripple r3"></div>
    <div class="ripple r4"></div>
  </div>
  <div class="stats-col">
    <div class="stat-box">
      <span class="snum">30%</span>
      <div class="slbl">metabolism<br>boost</div>
    </div>
    <div class="stat-box">
      <span class="snum">44%</span>
      <div class="slbl">more weight<br>lost</div>
    </div>
    <div class="stat-box">
      <span class="snum">0</span>
      <div class="slbl">cost to<br>implement</div>
    </div>
  </div>
  <div class="top-label"><span class="tag">💧 Hydration</span></div>
  <div class="content">
    <span class="emoji">💧</span>
    <h1>How Drinking <span>Water</span> Helps You Lose Weight Faster</h1>
  </div>
  <div class="branding">
    <div class="brand-name"><span class="leaf">🌿</span> The Wellness Key</div>
    <div class="brand-right">
      <div class="brand-dot"></div>
      <span class="brand-url">thewellnesskey.com</span>
    </div>
  </div>
</body>
</html>
