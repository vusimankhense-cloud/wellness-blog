<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Banner 5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 30%, #7b5ea7 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-circles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .bg-circles span { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .c1 { width: 460px; height: 460px; bottom: -160px; right: -100px; }
  .c2 { width: 240px; height: 240px; top: -80px; left: -60px; }

  /* Food grid decoration */
  .food-grid {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    opacity: 0.7;
  }
  .food-item {
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .food-item .fi-emoji { font-size: 32px; line-height: 1; }
  .food-item .fi-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 0.3px; }

  .top-label { position: absolute; top: 44px; left: 64px; }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(255,255,255,0.9);
  }

  .content {
    text-align: left;
    padding: 0 64px;
    padding-right: 340px;
    position: relative;
    z-index: 2;
    width: 100%;
  }
  .number-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #74c69d, #40916c);
    border-radius: 20px;
    font-size: 36px;
    font-weight: 900;
    color: white;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(64,145,108,0.4);
  }
  h1 {
    font-size: 58px; font-weight: 800; color: #ffffff;
    line-height: 1.15; letter-spacing: -1.5px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  h1 span { color: #74c69d; }

  .branding {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 64px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .brand-name { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #ffffff; }
  .brand-name .leaf { font-size: 22px; }
  .brand-url { font-size: 15px; color: rgba(255,255,255,0.55); }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #74c69d; }
  .brand-right { display: flex; align-items: center; gap: 12px; }
  .deco-line {
    position: absolute; left: 0; right: 0; height: 4px; top: 0;
    background: linear-gradient(90deg, #74c69d, #b5a0d8, #74c69d);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>
  <div class="bg-circles">
    <span class="c1"></span><span class="c2"></span>
  </div>
  <div class="food-grid">
    <div class="food-item"><span class="fi-emoji">🥚</span><span class="fi-label">Eggs</span></div>
    <div class="food-item"><span class="fi-emoji">🍵</span><span class="fi-label">Green Tea</span></div>
    <div class="food-item"><span class="fi-emoji">🌶️</span><span class="fi-label">Chilli</span></div>
    <div class="food-item"><span class="fi-emoji">🐟</span><span class="fi-label">Oily Fish</span></div>
    <div class="food-item"><span class="fi-emoji">☕</span><span class="fi-label">Coffee</span></div>
    <div class="food-item"><span class="fi-emoji">🫘</span><span class="fi-label">Legumes</span></div>
  </div>
  <div class="top-label"><span class="tag">🥗 Nutrition</span></div>
  <div class="content">
    <div class="number-badge">10</div>
    <h1>Foods That <span>Speed Up</span> Your Metabolism</h1>
  </div>
  <div class="branding">
    <div class="brand-name"><span class="leaf">🌿</span> The Wellness Key</div>
    <div class="brand-right">
      <div class="brand-dot"></div>
      <span class="brand-url">thewellnesskey.com</span>
    </div>
  </div>
</body>
</html>
