<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Banner 6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #4a2c6e 0%, #2d6a4f 55%, #1b4332 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-circles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .bg-circles span { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .c1 { width: 500px; height: 500px; top: -200px; right: -150px; }
  .c2 { width: 260px; height: 260px; bottom: -100px; left: -60px; }

  /* Question mark decoration */
  .big-q {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 240px;
    font-weight: 900;
    color: rgba(255,255,255,0.05);
    line-height: 1;
    font-family: Georgia, serif;
    user-select: none;
  }

  /* Reason pills */
  .reasons {
    position: absolute;
    right: 64px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .reason-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .top-label { position: absolute; top: 44px; left: 64px; }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(255,255,255,0.9);
  }

  .content {
    text-align: left;
    padding: 0 64px;
    padding-right: 360px;
    position: relative;
    z-index: 2;
    width: 100%;
  }
  .emoji {
    font-size: 80px; line-height: 1; margin-bottom: 24px; display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
  }
  h1 {
    font-size: 52px; font-weight: 800; color: #ffffff;
    line-height: 1.2; letter-spacing: -1.5px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.35);
  }
  h1 span { color: #b5a0d8; }

  .branding {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 64px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .brand-name { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #ffffff; }
  .brand-name .leaf { font-size: 22px; }
  .brand-url { font-size: 15px; color: rgba(255,255,255,0.55); }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #b5a0d8; }
  .brand-right { display: flex; align-items: center; gap: 12px; }
  .deco-line {
    position: absolute; left: 0; right: 0; height: 4px; top: 0;
    background: linear-gradient(90deg, #b5a0d8, #74c69d, #b5a0d8);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>
  <div class="bg-circles">
    <span class="c1"></span><span class="c2"></span>
  </div>
  <div class="reasons">
    <div class="reason-pill">😰 Chronic stress</div>
    <div class="reason-pill">😴 Poor sleep</div>
    <div class="reason-pill">🥤 Liquid calories</div>
    <div class="reason-pill">🦋 Thyroid issues</div>
    <div class="reason-pill">📉 Metabolic adaptation</div>
    <div class="reason-pill">🥑 Portion distortion</div>
  </div>
  <div class="top-label"><span class="tag">🔍 Troubleshooting</span></div>
  <div class="content">
    <span class="emoji">🤔</span>
    <h1>Why You're <span>Not Losing Weight</span> Even Though You Eat Healthy</h1>
  </div>
  <div class="branding">
    <div class="brand-name"><span class="leaf">🌿</span> The Wellness Key</div>
    <div class="brand-right">
      <div class="brand-dot"></div>
      <span class="brand-url">thewellnesskey.com</span>
    </div>
  </div>
</body>
</html>
