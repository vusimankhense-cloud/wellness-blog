<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Banner 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #4a2c6e 0%, #7b5ea7 45%, #2d6a4f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-circles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .bg-circles span { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .c1 { width: 500px; height: 500px; top: -180px; left: -120px; }
  .c2 { width: 280px; height: 280px; bottom: -100px; right: -60px; }
  .c3 { width: 160px; height: 160px; top: 200px; left: 260px; background: rgba(255,255,255,0.03) !important; }

  .top-label { position: absolute; top: 44px; left: 64px; }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
  }

  .content {
    text-align: center;
    padding: 0 80px;
    position: relative;
    z-index: 2;
    max-width: 1000px;
  }
  .emoji {
    font-size: 90px;
    line-height: 1;
    margin-bottom: 28px;
    display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
  }
  h1 {
    font-size: 60px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.15;
    letter-spacing: -1.5px;
    text-shadow: 0 2px 24px rgba(0,0,0,0.35);
  }
  h1 span { color: #b5a0d8; }

  .branding {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.18);
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .brand-name {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px;
  }
  .brand-name .leaf { font-size: 22px; }
  .brand-url { font-size: 15px; color: rgba(255,255,255,0.6); letter-spacing: 0.3px; }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #b5a0d8; }
  .brand-right { display: flex; align-items: center; gap: 12px; }
  .deco-line {
    position: absolute; left: 0; right: 0; height: 4px; top: 0;
    background: linear-gradient(90deg, #b5a0d8, #74c69d, #b5a0d8);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>
  <div class="bg-circles">
    <span class="c1"></span><span class="c2"></span><span class="c3"></span>
  </div>
  <div class="top-label"><span class="tag">💜 Mindful Eating</span></div>
  <div class="content">
    <span class="emoji">🍽️</span>
    <h1>The Power of <span>Mindful Eating</span> for Natural Weight Loss</h1>
  </div>
  <div class="branding">
    <div class="brand-name"><span class="leaf">🌿</span> The Wellness Key</div>
    <div class="brand-right">
      <div class="brand-dot"></div>
      <span class="brand-url">thewellnesskey.com</span>
    </div>
  </div>
</body>
</html>
