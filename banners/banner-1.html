<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Banner 1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 35%, #4a2c6e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Background pattern */
  .bg-circles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .bg-circles span {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .c1 { width: 480px; height: 480px; top: -160px; right: -100px; }
  .c2 { width: 320px; height: 320px; bottom: -120px; left: -80px; }
  .c3 { width: 200px; height: 200px; top: 180px; right: 200px; background: rgba(255,255,255,0.03) !important; }
  .c4 { width: 100px; height: 100px; top: 60px; left: 200px; }

  /* Top label */
  .top-label {
    position: absolute;
    top: 44px;
    left: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
  }

  /* Main content */
  .content {
    text-align: center;
    padding: 0 80px;
    position: relative;
    z-index: 2;
    max-width: 1000px;
  }

  .emoji {
    font-size: 90px;
    line-height: 1;
    margin-bottom: 28px;
    display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
  }

  h1 {
    font-size: 62px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.15;
    letter-spacing: -1.5px;
    text-shadow: 0 2px 24px rgba(0,0,0,0.35);
    margin-bottom: 0;
  }

  h1 span {
    color: #74c69d;
  }

  /* Bottom branding */
  .branding {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.18);
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .brand-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.3px;
  }

  .brand-name .leaf { font-size: 22px; }

  .brand-url {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.3px;
  }

  .brand-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #74c69d;
  }

  .brand-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Decorative line */
  .deco-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 4px;
    top: 0;
    background: linear-gradient(90deg, #74c69d, #b5a0d8, #74c69d);
  }
</style>
</head>
<body>
  <div class="deco-line"></div>

  <div class="bg-circles">
    <span class="c1"></span>
    <span class="c2"></span>
    <span class="c3"></span>
    <span class="c4"></span>
  </div>

  <div class="top-label">
    <span class="tag">🌿 Wellness Tips</span>
  </div>

  <div class="content">
    <span class="emoji">🔥</span>
    <h1>5 Natural Ways to <span>Boost Your Metabolism</span> Today</h1>
  </div>

  <div class="branding">
    <div class="brand-name">
      <span class="leaf">🌿</span> The Wellness Key
    </div>
    <div class="brand-right">
      <div class="brand-dot"></div>
      <span class="brand-url">thewellnesskey.com</span>
    </div>
  </div>
</body>
</html>
